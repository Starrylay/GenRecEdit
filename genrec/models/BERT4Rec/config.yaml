# Overwritting configs
train_batch_size: 256
eval_batch_size: 256
lr: 3e-3

max_item_seq_len: 20

hidden_size: 64
num_hidden_layers: 4
num_attention_heads: 2
intermediate_size: 256
hidden_act: gelu_new
hidden_dropout_prob: 0.1
attention_probs_dropout_prob: 0.1
initializer_range: 0.02
layer_norm_eps: 1e-12

mask_ratio: 0.3