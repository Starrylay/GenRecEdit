# Overall configs
pipeline_stage: tokenization    # tokenization, training, evaluation
metadata: sentence_feature
lr: 5e-5
epochs: 4
train_batch_size: 16
eval_batch_size: 16
weight_decay: 0.01
gradient_accumulation_steps: 2
warmup_ratio: 0.03
deepspeed: genrec/models/LCRec/deepspeed.json

# Config for sentence embedding model
sent_emb_model: sentence-transformers/sentence-t5-base
sent_emb_batch_size: 512
sent_emb_dim: 768
sent_emb_pca: 128     # -1 means no PCA, otherwise PCA dimension

# Config for RQ
rq_n_codebooks: 4
rq_codebook_size: 256

# Config for RQ-VAE
rqvae_hidden_sizes: [2048,1024,512,256,128]
rqvae_dropout: 0.0
rqvae_lr: 0.001
ravae_batch_size: 2048
rqvae_epoch: 10000
rqvae_beta: 0.25
rqvae_verbose: 100
rqvae_low_usage_threshold: -1 # reassignment (to low usage entries only) is triggered when there're more than 10 low usage entries, -1 means no reassignment
rqvae_sk_epsilon: 0.003
rqvae_sk_iters: 10


# Config for LCRec
model_name_or_path: huggyllama/llama-7b
max_item_seq_len: 20  # Maximum #items in a sequence
num_beams: 20         # Number of beams for beam search
his_sep: ", "         # Separator for history items
max_source_length: 1024
max_target_length: 1024



# Config for Lora
lora: False
lora_r: 8
lora_alpha: 32
lora_target_modules: ["q_proj","v_proj","k_proj","o_proj","gate_proj","down_proj","up_proj"]
lora_modules_to_save: ["embed_tokens","lm_head"]
lora_dropout: 0.1


# Config for evaluation
model_checkpoint_path: ~
test_epochs: [3]
test_prompt_ids: [0]