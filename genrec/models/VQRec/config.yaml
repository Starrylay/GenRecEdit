# Overwritting configs
metadata: sentence

# Config the sentence embedding model
sent_emb_model: sentence-transformers/sentence-t5-base
sent_emb_batch_size: 512
sent_emb_dim: 768
sent_emb_pca: -1

# Config for the backbone model
max_item_seq_len: 20
n_embd: 64
n_layer: 2
n_head: 2
n_inner: 256
activation_function: relu #gelu_new
resid_pdrop: 0.0
embd_pdrop: 0.0
attn_pdrop: 0.0
layer_norm_epsilon: 1e-12
initializer_range: 0.02

# VQ-Rec specific configs
n_codebook: 8
codebook_size: 256
opq_use_gpu: False
opq_gpu_id: 0
faiss_omp_num_threads: 32

train_batch_size: 512